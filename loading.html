<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bright RP - Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080814;
    color: #e0e0e0;
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Background ── */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .bg-glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,64,0.05) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse 5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 1;   }
    50%       { transform: translate(-50%,-50%) scale(1.1); opacity: 0.5; }
  }

  /* ── Corner labels ── */
  .corner {
    position: absolute;
    font-size: 9px;
    letter-spacing: 2px;
    color: #2a2a40;
    text-transform: uppercase;
    z-index: 2;
  }
  .corner.tl { top: 18px; left: 22px; }
  .corner.tr { top: 18px; right: 22px; }
  .corner.bl { bottom: 18px; left: 22px; }
  .corner.br { bottom: 18px; right: 22px; }

  /* ── Main container ── */
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 700px;
    padding: 0 32px;
  }

  /* ── Logo ring ── */
  .logo-ring {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid rgba(240,192,64,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 26px;
    position: relative;
    animation: spin-slow 10s linear infinite;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #f0c040;
    border-right-color: rgba(240,192,64,0.3);
    animation: spin-fast 1.8s linear infinite;
  }

  @keyframes spin-slow { to { transform: rotate(360deg);  } }
  @keyframes spin-fast { to { transform: rotate(360deg);  } }

  .logo-inner {
    animation: spin-slow 10s linear infinite reverse;
    font-size: 30px;
    font-weight: 900;
    color: #f0c040;
    letter-spacing: -1px;
    user-select: none;
  }

  /* ── Title ── */
  .server-name {
    font-size: 54px;
    font-weight: 800;
    letter-spacing: 7px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
  }
  .server-name .bright { color: #f0c040; }
  .server-name .rp     { color: #ffffff; }

  .subtitle {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 10px;
  }

  .owner-tag {
    display: inline-block;
    font-size: 10px;
    color: #f0c040;
    background: rgba(240,192,64,0.07);
    border: 1px solid rgba(240,192,64,0.18);
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* ── Info row ── */
  .info-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 28px;
    margin-bottom: 38px;
  }

  .info-item { text-align: center; }

  .info-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #383848;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 13px;
    font-weight: 600;
    color: #bbb;
  }
  .info-value.gold { color: #f0c040; }

  .divider {
    width: 1px;
    height: 28px;
    background: #161628;
  }

  /* ── Progress bar ── */
  .progress-wrap { width: 100%; margin-bottom: 14px; }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #383848;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: #0e0e22;
    border-radius: 2px;
    overflow: visible;
    border: 1px solid #181830;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #9a7418, #f0c040);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s ease;
    position: relative;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #f0c040;
    box-shadow: 0 0 10px #f0c040, 0 0 20px rgba(240,192,64,0.4);
  }

  /* ── Status text ── */
  .status-text {
    font-size: 11px;
    color: #383848;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 12px;
    min-height: 16px;
  }

  .file-text {
    font-size: 10px;
    color: #282838;
    margin-top: 5px;
    min-height: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Music control ── */
  .music-btn {
    position: absolute;
    bottom: 18px;
    right: 22px;
    z-index: 10;
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.2);
    color: #f0c040;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .music-btn:hover { background: rgba(240,192,64,0.15); }

  /* ── Dots animation ── */
  .dots span { animation: blink 1.4s infinite; opacity: 0; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40%            { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- Corner labels -->
<div class="corner tl">Bright RP</div>
<div class="corner tr" id="corner-map">Downtown</div>
<div class="corner bl">Owner: John John</div>

<!-- Music toggle button (bottom right, replaces static corner) -->
<button class="music-btn" id="music-btn" onclick="toggleMusic()">&#9654; Music</button>

<!-- Hidden audio element -->
<audio id="bg-music" loop preload="auto">
  <source src="epitome.mp3" type="audio/mpeg">
</audio>

<!-- Main content -->
<div class="container">

  <div class="logo-ring">
    <div class="logo-inner">B</div>
  </div>

  <div class="server-name">
    <span class="bright">Bright</span><span class="rp"> RP</span>
  </div>
  <div class="subtitle">Downtown Roleplay Experience</div>
  <div class="owner-tag">Owner: John John</div>

  <div class="info-row">
    <div class="info-item">
      <div class="info-label">Map</div>
      <div class="info-value gold" id="info-map">Downtown</div>
    </div>
    <div class="divider"></div>
    <div class="info-item">
      <div class="info-label">Gamemode</div>
      <div class="info-value">DarkRP</div>
    </div>
    <div class="divider"></div>
    <div class="info-item">
      <div class="info-label">Players</div>
      <div class="info-value" id="info-players">32 Slots</div>
    </div>
    <div class="divider"></div>
    <div class="info-item">
      <div class="info-label">Status</div>
      <div class="info-value gold">Online</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>Loading<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="status-text" id="status-text">Connecting to server...</div>
  <div class="file-text" id="file-text">&nbsp;</div>

</div>

<script>
  // ── Progress animation ──────────────────────────────────────
  var progress = 0;
  var targetProgress = 0;

  (function tick() {
    if (progress < targetProgress) {
      progress = Math.min(progress + 0.7, targetProgress);
      var pct = Math.round(progress);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').innerText = pct + '%';
    }
    requestAnimationFrame(tick);
  })();

  // Demo steps (replaced by real GMod callbacks when running in-game)
  var steps = [
    { pct: 10, delay: 400,  status: 'Connecting to server...' },
    { pct: 28, delay: 900,  status: 'Receiving server info...' },
    { pct: 50, delay: 1800, status: 'Downloading resources...'  },
    { pct: 72, delay: 3000, status: 'Loading content...'        },
    { pct: 90, delay: 4200, status: 'Almost ready...'           },
  ];
  steps.forEach(function(s) {
    setTimeout(function() {
      targetProgress = s.pct;
      document.getElementById('status-text').innerText = s.status;
    }, s.delay);
  });

  // ── GMod callbacks ──────────────────────────────────────────
  window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
    if (mapname)    {
      document.getElementById('info-map').innerText    = mapname;
      document.getElementById('corner-map').innerText  = mapname;
    }
    if (maxplayers) {
      document.getElementById('info-players').innerText = maxplayers + ' Slots';
    }
  };

  window.SetStatusChanged = function(status) {
    document.getElementById('status-text').innerText = status;
    if (status.indexOf('Sending client')    !== -1) targetProgress = 55;
    if (status.indexOf('Receiving client')  !== -1) targetProgress = 78;
    if (status.indexOf('Loading')           !== -1) targetProgress = 95;
  };

  window.DownloadingFile = function(filename) {
    document.getElementById('file-text').innerText = filename || '';
    if (targetProgress < 88) targetProgress = Math.min(targetProgress + 1, 88);
  };

  // ── Music ───────────────────────────────────────────────────
  var music   = document.getElementById('bg-music');
  var playing = false;
  music.volume = 0.35;

  // GMod Chromium allows autoplay — try immediately
  music.play().then(function() {
    playing = true;
    document.getElementById('music-btn').innerText = '\u23F8 Music';
  }).catch(function() {
    // If blocked, user can click the button
    playing = false;
  });

  function toggleMusic() {
    if (playing) {
      music.pause();
      playing = false;
      document.getElementById('music-btn').innerText = '\u25BA Music';
    } else {
      music.play();
      playing = true;
      document.getElementById('music-btn').innerText = '\u23F8 Music';
    }
  }
</script>
</body>
</html>
